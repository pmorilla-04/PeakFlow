<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!--Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Global CSS -->
     <!-- Design system: colors, typography, spacing, shadows, etc. -->
    <link rel="stylesheet" href="assets/css/variables.css">

    <!-- CSS reset: removes browser default styles -->
    <link rel="stylesheet" href="assets/css/reset.css">

    <!-- General page layout: header, sidebar, containers, grid... -->
    <link rel="stylesheet" href="assets/css/layout.css">

    <!-- Reusable UI components: buttons, cards, forms, modals... -->
    <link rel="stylesheet" href="assets/css/components.css">

    <!-- Utility classes: flex, hidden, text-center, margins... -->
    <link rel="stylesheet" href="assets/css/utilities.css">


    <!-- Page CSS -->
    <link rel="stylesheet" href="assets/css/pages/dashboard.css">
</head>
<body>
    <header class="header">

        <!--Left-->
        <div class="header-left">
            <div class="page-title">
                <h1>Dashboard</h1>
                <p>Wecome back 👋</p>
            </div>
            

        </div>

        <!--Center-->
        <div class="header-center">
            <form class="search-form">
                <i data-lucide="search"></i>  
                <input type="text" placeholder="Search...">
            </form>
        </div>

        <!--Right-->
        <div class="header-right">

            <!-- Language -->
            <button class="icon-btn">
                <i data-lucide="languages"></i>
            </button>

            <!-- Theme -->
            <button class="icon-btn">
                <i data-lucide="moon"></i>
            </button>

            <!-- Notifications -->
            <button class="icon-btn">
                <i data-lucide="bell"></i>
                <span class="notification-dot"></span>
            </button>

            <!-- Profile -->
            <button class="profile-btn">

                <div class="profile-info">
                    <span class="profile-name">Pau</span>
                    <span class="profile-role">Athlete</span>
                </div>

                <i data-lucide="chevron-down"></i>

            </button>
        </div>
    </header>

    <aside class="sidebar">
        <!--LOGO-->
        <div class="sidebar-logo">
            <a href="dashboard.html">
                <img src="assets/images/01_LOGO_.png" alt="Logo">
            </a>
        </div>
            <!--NAVEGATION-->
             <nav class="sidebar-nav">

                <ul class="nav-list">

                    <li>
                        <a href="dashboard.html" class="nav-link active">
                            <i data-lucide="layout-dashboard"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li>
                        <a href="calendar.html" class="nav-link">
                            <i data-lucide="calendar"></i>
                            <span>Calendar</span>
                        </a>
                    </li>

                    <li>
                        <a href="activities.html" class="nav-link">
                            <i data-lucide="bike"></i>
                            <span>Activities</span>
                        </a>
                    </li>

                    <li>
                        <a href="analysis.html" class="nav-link">
                            <i data-lucide="chart-column"></i>
                            <span>Analysis</span>
                        </a>
                    </li>

                    <li>
                        <a href="goals.html" class="nav-link">
                            <i data-lucide="target"></i>
                            <span>Goals</span>
                        </a>
                    </li>

                    <li>
                        <a href="reports.html" class="nav-link">
                            <i data-lucide="file-text"></i>
                            <span>Reports</span>
                        </a>
                    </li>

                    <li>
                        <a href="ai-coach.html" class="nav-link">
                            <i data-lucide="sparkles"></i>
                            <span>AI Coach</span>
                        </a>
                    </li>

                </ul>

            </nav>
            
            <div class="sidebar-footer">

                <a href="settings.html" class="nav-link">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>

                <a href="profile.html" class="nav-link">
                    <i data-lucide="user"></i>
                    <span>Profile</span>
                </a>

                <span class="sidebar-version">
                    v1.0.0
                </span>
                
            </div>

        
    </aside>









    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
